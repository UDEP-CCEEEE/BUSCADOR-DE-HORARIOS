<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jarvis - Planificador Inteligente de Reuniones v3.1</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #0052cc; /* Color azul corporativo */
            --dark-blue: #002266;    /* Azul profundo para bordes definidos */
            --light-blue: #deebff;
            --danger-red: #d93025;
            --bg-gray: #f4f5f7;
            --text-dark: #172b4d;
            --border-color: #c1c7d0; /* Borde de la tabla un poco más marcado */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-gray);
            color: var(--text-dark);
            padding: 30px;
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 12px rgba(9, 30, 66, 0.08);
        }

        header {
            margin-bottom: 25px;
            border-bottom: 2px solid #eaecf0;
            padding-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            font-size: 24px;
            color: var(--primary-blue);
            font-weight: 700;
        }

        header p {
            font-size: 14px;
            color: #5e6c84;
            margin-top: 5px;
        }

        /* Panel de Control Dinámico */
        .control-panel {
            background-color: #fafbfc;
            border: 1px solid #dfe1e6;
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .control-panel label {
            font-size: 14px;
            font-weight: 600;
            color: #4a5568;
        }

        .control-panel select {
            padding: 8px 12px;
            font-size: 14px;
            border-radius: 6px;
            border: 2px solid var(--border-color);
            outline: none;
            background-color: white;
            font-weight: 600;
            color: var(--primary-blue);
            cursor: pointer;
        }

        /* Contenedor Adaptable de Buscadores */
        .search-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }

        .search-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            background: #fff;
            padding: 10px;
            border: 1px solid #dfe1e6;
            border-radius: 8px;
        }

        .search-group label {
            font-size: 11px;
            font-weight: 700;
            color: #5e6c84;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .search-box {
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 10px 12px;
            font-size: 13px;
            border: 2px solid var(--border-color);
            border-radius: 6px;
            outline: none;
            transition: all 0.2s ease;
        }

        .search-box input:focus {
            border-color: var(--primary-blue);
            box-shadow: 0 0 0 3px var(--light-blue);
        }

        .suggestions {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            border: 1px solid var(--border-color);
            border-radius: 0 0 6px 6px;
            max-height: 180px;
            overflow-y: auto;
            z-index: 10;
            box-shadow: 0 8px 16px rgba(9,30,66,0.15);
            display: none;
        }

        .suggestions div {
            padding: 10px 12px;
            cursor: pointer;
            font-size: 13px;
            border-bottom: 1px solid #f4f5f7;
        }

        .suggestions div:hover {
            background-color: var(--light-blue);
            color: var(--primary-blue);
            font-weight: 500;
        }

        /* Tabla del Horario */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 15px;
            background: white;
        }

        th, td {
            border: 1px solid var(--border-color);
            padding: 6px;
            text-align: center;
            font-size: 12px;
            height: 52px;
        }

        th {
            background-color: #f4f5f7;
            font-weight: 600;
            color: #5e6c84;
            width: 14%;
        }

        th:first-child {
            width: 16%;
        }

        .time-col {
            font-weight: 600;
            background-color: #fafbfc;
            color: #5e6c84;
        }

        /* Bloque Ocupado con Bordes Muy Definidos y Oscuros */
        .occupied {
            background-color: var(--primary-blue) !important;
            color: white;
            font-weight: 600;
            font-size: 10px;
            line-height: 1.3;
            padding: 4px;
            border: 2px solid var(--dark-blue) !important; /* Bordes marcados */
            border-radius: 4px;
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.2);
            animation: fadeIn 0.2s ease;
        }

        .teacher-info {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 15px;
            color: #091e42;
            background: #fafbfc;
            padding: 12px 15px;
            border-radius: 6px;
            border-left: 4px solid var(--primary-blue);
        }

        .notes-container {
            margin-top: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .shared-note {
            background-color: #ffebe6;
            color: var(--danger-red);
            padding: 10px 15px;
            border-radius: 6px;
            font-weight: 600;
            font-size: 13px;
            border-left: 5px solid var(--danger-red);
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>

        "VEGA ACUÑA GERMÁN": {"horarios": [{"dia": "Lunes", "start": 11, "end": 13, "tag": "11 a 1 pm"}, {"dia": "Miércoles", "start": 11, "end": 13, "tag": "11 a 1 pm"}, {"dia": "Viernes", "start": 11, "end": 13, "tag": "11 a 1 pm"}, {"dia": "Miércoles", "start": 7, "end": 9, "tag": "7 a 9 am"}, {"dia": "Viernes", "start": 7, "end": 9, "tag": "7 a 9 am"}], "compartido": false, "companeros": []},

        "VELEZMORO MONTES VÍCTOR RAFAEL": {"horarios": [{"dia": "Lunes", "start": 7, "end": 9, "tag": "7 a 9 am"}, {"dia": "Miércoles", "start": 7, "end": 9, "tag": "7 a 9 am"}, {"dia": "Viernes", "start": 7, "end": 9, "tag": "7 a 9 am"}], "compartido": false, "companeros": []},
        "VENEGAS MORALES CECILIA": {"horarios": [{"dia": "Martes", "start": 16, "end": 18, "tag": "4 a 6 pm"}, {"dia": "Jueves", "start": 16, "end": 18, "tag": "4 a 6 pm"}, {"dia": "Martes", "start": 18, "end": 20, "tag": "6 a 8 pm"}, {"dia": "Jueves", "start": 18, "end": 20, "tag": "6 a 8 pm"}], "compartido": false, "companeros": []},

        "VITE TALLEDO FRANCISCO": {"horarios": [{"dia": "Martes", "start": 11, "end": 13, "tag": "11 a 1 pm"}, {"dia": "Jueves", "start": 11, "end": 13, "tag": "11 a 1 pm"}], "compartido": false, "companeros": []}
    };

    // Almacenamiento dinámico de nombres seleccionados
    let docentesSeleccionados = [""];

    // Inicializar el selector numérico de buscadores (1 a 20)
    function initBuscadorSelect() {
        const select = document.getElementById('buscadorCount');
        for (let i = 1; i <= 20; i++) {
            const opt = document.createElement('option');
            opt.value = i;
            opt.innerText = `${i} ${i === 1 ? 'Participante' : 'Participantes'}`;
            select.appendChild(opt);
        }
        select.addEventListener('change', function() {
            ajustarCantidadBuscadores(parseInt(this.value));
        });
    }

    // Inicializar la tabla de horarios visuales (Filas por hora de 7:00 am a 10:00 pm)
    function initScheduleTable() {
        const body = document.getElementById('scheduleBody');
        body.innerHTML = '';
        const dias = ['Lunes', 'Martes', 'Miércoles', 'Jueves', 'Viernes', 'Sábado'];
        
        for (let h = 7; h <= 21; h++) {
            const tr = document.createElement('tr');
            const tdHora = document.createElement('td');
            tdHora.className = 'time-col';
            let displayHour = h > 12 ? (h - 12) + ':00 pm' : (h === 12 ? '12:00 pm' : h + ':00 am');
            let nextHour = (h + 1) > 12 ? ((h + 1) - 12) + ':00 pm' : ((h + 1) === 12 ? '12:00 pm' : (h + 1) + ':00 am');
            tdHora.innerText = `${displayHour} - ${nextHour}`;
            tr.appendChild(tdHora);
            
            dias.forEach(dia => {
                const td = document.createElement('td');
                td.id = `cell-${dia}-${h}`;
                tr.appendChild(td);
            });
            body.appendChild(tr);
        }
    }

    // Modificar dinámicamente la cantidad de inputs en pantalla preservando datos
    function ajustarCantidadBuscadores(nuevaCantidad) {
        const container = document.getElementById('searchBarsContainer');
        const valoresAnteriores = [...docentesSeleccionados];
        
        docentesSeleccionados = new Array(nuevaCantidad).fill("");
        container.innerHTML = "";

        for (let i = 0; i < nuevaCantidad; i++) {
            if (valoresAnteriores[i]) {
                docentesSeleccionados[i] = valoresAnteriores[i];
            }

            const group = document.createElement('div');
            group.className = 'search-group';
            group.innerHTML = `
                <label>Participante ${i + 1}</label>
                <div class="search-box">
                    <input type="text" id="search-${i}" placeholder="Escribe el nombre o apellido..." autocomplete="off" value="${docentesSeleccionados[i]}">
                    <div id="suggestions-${i}" class="suggestions"></div>
                </div>
            `;
            container.appendChild(group);

            const input = group.querySelector('input');
            const sugDiv = group.querySelector('.suggestions');
            configurarEventosBuscador(input, sugDiv, i);
        }
        recalculateSchedules();
    }

    // Configurar la lógica individual de autocompletado para cada input creado
    function configurarEventosBuscador(input, suggestionsDiv, index) {
        input.addEventListener('input', function() {
            const query = this.value.toUpperCase().trim();
            suggestionsDiv.innerHTML = '';
            
            if (!query) {
                suggestionsDiv.style.display = 'none';
                docentesSeleccionados[index] = "";
                recalculateSchedules();
                return;
            }

            const matches = Object.keys(docentesDB).filter(nombre => nombre.includes(query));

            if (matches.length > 0) {
                matches.slice(0, 5).forEach(match => {
                    const div = document.createElement('div');
                    div.innerText = match;
                    div.addEventListener('click', () => {
                        input.value = match;
                        suggestionsDiv.style.display = 'none';
                        docentesSeleccionados[index] = match;
                        recalculateSchedules();
                    });
                    suggestionsDiv.appendChild(div);
                });
                suggestionsDiv.style.display = 'block';
            } else {
                suggestionsDiv.style.display = 'none';
            }
        });

        input.addEventListener('blur', function() {
            setTimeout(() => {
                if (this.value.trim() === "") {
                    docentesSeleccionados[index] = "";
                    recalculateSchedules();
                }
            }, 200);
        });
    }

    // Cruzar agendas en la matriz horaria acumulativa
    function recalculateSchedules() {
        document.querySelectorAll('#scheduleBody td:not(.time-col)').forEach(td => {
            td.className = '';
            td.innerText = '';
        });

        const mapaOcupacion = {};
        const activos = docentesSeleccionados.filter(p => p && docentesDB[p]);

        const summary = document.getElementById('selectedTeachersSummary');
        summary.innerText = activos.length === 0 
            ? "Filtros activos: Ningún participante seleccionado" 
            : `Filtros activos: ${activos.join(' ── ')}`;

        const notesContainer = document.getElementById('notesContainer');
        notesContainer.innerHTML = '';
        activos.forEach(prof => {
            const info = docentesDB[prof];
            if (info.compartido && info.companeros.length > 0) {
                const noteDiv = document.createElement('div');
                noteDiv.className = 'shared-note';
                noteDiv.innerText = `⚠️ El participante "${prof}" comparte curso con: ${info.companeros.join(', ')}`;
                notesContainer.appendChild(noteDiv);
            }
        });

        activos.forEach(prof => {
            docentesDB[prof].horarios.forEach(bloque => {
                for (let h = bloque.start; h < bloque.end; h++) {
                    const key = `${bloque.dia}-${h}`;
                    if (!mapaOcupacion[key]) mapaOcupacion[key] = [];
                    if (!mapaOcupacion[key].includes(prof)) mapaOcupacion[key].push(prof);
                }
            });
        });

        Object.keys(mapaOcupacion).forEach(key => {
            const cell = document.getElementById(`cell-${key}`);
            if (cell) {
                cell.className = 'occupied';
                cell.innerHTML = `OCUPADO POR:<br><strong>${mapaOcupacion[key].join('<br>')}</strong>`;
            }
        });
    }

    document.addEventListener('click', function(e) {
        if (!e.target.id.startsWith('search-')) {
            document.querySelectorAll('.suggestions').forEach(div => div.style.display = 'none');
        }
    });

    initBuscadorSelect();
    initScheduleTable();
    ajustarCantidadBuscadores(1); 
</script>
