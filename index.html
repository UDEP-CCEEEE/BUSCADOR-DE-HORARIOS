<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Rifa FINAE</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Arial', sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;

    background:
    linear-gradient(
        135deg,
        #b7ff4f,
        #79d70f,
        #5eb30b
    );
}

.contenedor{

    width:420px;

    background:white;

    border-radius:30px;

    padding:40px 30px;

    text-align:center;

    box-shadow:0 15px 40px rgba(0,0,0,0.15);

    border:5px solid #2d5f2d;

}

.logo{

    width:140px;
    margin-bottom:15px;

}

h1{

    color:#215221;
    font-size:34px;
    margin-bottom:10px;

}

.subtitulo{

    color:#4f4f4f;
    margin-bottom:25px;
    font-size:16px;

}

.inputCodigo{

    width:100%;

    padding:18px;

    border-radius:15px;

    border:3px solid #7ed321;

    outline:none;

    font-size:18px;

    text-align:center;

    margin-bottom:20px;

    transition:0.3s;

}

.inputCodigo:focus{

    border-color:#2d5f2d;
    transform:scale(1.02);

}

.boton{

    width:100%;

    padding:18px;

    border:none;

    border-radius:15px;

    background:#2d5f2d;

    color:white;

    font-size:18px;

    cursor:pointer;

    font-weight:bold;

    transition:0.3s;

}

.boton:hover{

    background:#1d431d;
    transform:translateY(-2px);

}

.resultado{

    margin-top:30px;
    display:none;

}

.resultado img{

    width:230px;
    margin-bottom:15px;

}

.mensaje{

    font-size:28px;
    font-weight:bold;
    line-height:1.3;

}

.ganador{

    color:#2d8a2d;

}

.perdedor{

    color:#ff7b00;

}

</style>
</head>

<body>

<div class="contenedor">

    <!-- TU IMAGEN -->
    <img 
        src="cerdito.png" 
        alt="FINAE"
        class="logo"
    >

    <h1>🎟️ Rifa FINAE</h1>

    <div class="subtitulo">
        Ingresa tu código y descubre si ganaste
    </div>

    <input
        type="text"
        id="codigo"
        class="inputCodigo"
        placeholder="ESCRIBE TU CÓDIGO"
    >

    <button class="boton" onclick="verificarCodigo()">
        Verificar Código
    </button>

    <div class="resultado" id="resultado">

        <img
            id="imagenResultado"
            src=""
            alt="Resultado"
        >

        <div
            class="mensaje"
            id="mensaje">
        </div>

    </div>

</div>

<script>

const codigosGanadores = [

    "FINAE2026",
    "GANADOR20",
    "PREMIOFINAE",
    "SUERTE777"

];

function verificarCodigo(){

    const codigo = document
    .getElementById("codigo")
    .value
    .trim()
    .toUpperCase();

    const resultado = document.getElementById("resultado");

    const mensaje = document.getElementById("mensaje");

    const imagen = document.getElementById("imagenResultado");

    resultado.style.display = "block";

    // SI GANA

    if(codigosGanadores.includes(codigo)){

        mensaje.innerHTML = `
            Felicidades 🎉 <br>
            ganaste un premio de 20 soles
        `;

        mensaje.className = "mensaje ganador";

        imagen.src = "ganador.png";

    }

    // SI PIERDE

    else{

        mensaje.innerHTML = `
            Sigue intentando 😢 <br>
            estuviste muy cerca
        `;

        mensaje.className = "mensaje perdedor";

        imagen.src = "perdedor.png";

    }

}

</script>

</body>
</html>
