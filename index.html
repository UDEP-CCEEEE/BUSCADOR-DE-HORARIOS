<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jarvis - Control de Disponibilidad Docente v2.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #0052cc; /* Color azul del proyecto */
            --light-blue: #deebff;
            --danger-red: #d93025;
            --bg-gray: #f4f5f7;
            --text-dark: #172b4d;
            --border-color: #dee2e6;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-gray);
            color: var(--text-dark);
            padding: 30px;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 12px rgba(9, 30, 66, 0.08);
        }

        header {
            margin-bottom: 25px;
            border-bottom: 2px solid var(--bg-gray);
            padding-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            font-size: 24px;
            color: var(--primary-blue);
            font-weight: 700;
        }

        header p {
            font-size: 14px;
            color: #5e6c84;
            margin-top: 5px;
        }

        .stats-badge {
            background-color: var(--light-blue);
            color: var(--primary-blue);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .search-box {
            position: relative;
            margin-bottom: 25px;
        }

        .search-box input {
            width: 100%;
            padding: 14px 20px;
            font-size: 16px;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            outline: none;
            transition: all 0.2s ease;
        }

        .search-box input:focus {
            border-color: var(--primary-blue);
            box-shadow: 0 0 0 3px var(--light-blue);
        }

        .suggestions {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            border: 1px solid var(--border-color);
            border-radius: 0 0 8px 8px;
            max-height: 250px;
            overflow-y: auto;
            z-index: 10;
            box-shadow: 0 8px 16px rgba(9,30,66,0.15);
            display: none;
        }

        .suggestions div {
            padding: 12px 20px;
            cursor: pointer;
            font-size: 14px;
            border-bottom: 1px solid #f4f5f7;
        }

        .suggestions div:last-child {
            border-bottom: none;
        }

        .suggestions div:hover {
            background-color: var(--light-blue);
            color: var(--primary-blue);
            font-weight: 500;
        }

        .schedule-card {
            margin-top: 20px;
        }

        .teacher-info {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 15px;
            color: #091e42;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 15px;
            background: white;
        }

        th, td {
            border: 1px solid var(--border-color);
            padding: 10px;
            text-align: center;
            font-size: 13px;
        }

        th {
            background-color: #f4f5f7;
            font-weight: 600;
            color: #5e6c84;
            width: 14%;
        }

        th:first-child {
            width: 16%;
        }

        .time-col {
            font-weight: 600;
            background-color: #fafbfc;
            color: #5e6c84;
        }

        /* Bloque Ocupado (Azul corporativo) */
        .occupied {
            background-color: var(--primary-blue) !important;
            color: white;
            font-weight: 600;
            font-size: 11px;
            letter-spacing: 0.5px;
            animation: fadeIn 0.25s ease;
        }

        /* Nota informativa en Rojo */
        .shared-note {
            display: none;
            background-color: #ffebe6;
            color: var(--danger-red);
            padding: 12px 15px;
            border-radius: 6px;
            font-weight: 600;
            font-size: 14px;
            margin-top: 15px;
            border-left: 5px solid var(--danger-red);
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-2px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div>
            <h1>Jarvis - Disponibilidad Docente</h1>
            <p>Introduce el nombre de un docente para visualizar gráficamente sus bloques de clase ocupados.</p>
        </div>
        <div class="stats-badge" id="teacherCount">118 Docentes Verificados</div>
    </header>

    <div class="search-box">
        <input type="text" id="searchTeacher" placeholder="Escribe el nombre del profesor (Ej: HIDALGO, VALERA, GUZMAN...)" autocomplete="off">
        <div id="suggestions" class="suggestions"></div>
    </div>

    <div class="schedule-card">

            <tbody id="scheduleBody">

        </table>

        <div id="sharedNote" class="shared-note"></div>
    </div>
</div>

        "VILLACORTA REYES JUAN CARLOS": {"horarios": [{"dia": "Lunes", "start": 16, "end": 18, "tag": "4 a 6 pm"}, {"dia": "Jueves", "start": 16, "end": 18, "tag": "4 a 6 pm"}], "compartido": false, "companeros": []},
        "VILLASANTE ABRAMONTE JAIME": {"horarios": [{"dia": "Lunes", "start": 9, "end": 11, "tag": "9 a 11 am"}, {"dia": "Miércoles", "start": 9, "end": 11, "tag": "9 a 11 am"}, {"dia": "Viernes", "start": 9, "end": 11, "tag": "9 a 11 am"}], "compartido": false, "companeros": []},
        "VITE TALLEDO FRANCISCO": {"horarios": [{"dia": "Martes", "start": 11, "end": 13, "tag": "11 a 1 pm"}, {"dia": "Jueves", "start": 11, "end": 13, "tag": "11 a 1 pm"}], "compartido": false, "companeros": []}
    };

    // Inicializar la tabla de horarios visuales (Filas por hora de 7:00 am a 10:00 pm)
    function initScheduleTable() {
        const body = document.getElementById('scheduleBody');
        body.innerHTML = '';
        const dias = ['Lunes', 'Martes', 'Miércoles', 'Jueves', 'Viernes', 'Sábado'];
        
        for (let h = 7; h <= 21; h++) {
            const tr = document.createElement('tr');
            
            // Columna de hora formato am/pm
            const tdHora = document.createElement('td');
            tdHora.className = 'time-col';
            let displayHour = h > 12 ? (h - 12) + ':00 pm' : (h === 12 ? '12:00 pm' : h + ':00 am');
            let nextHour = (h + 1) > 12 ? ((h + 1) - 12) + ':00 pm' : ((h + 1) === 12 ? '12:00 pm' : (h + 1) + ':00 am');
            tdHora.innerText = `${displayHour} - ${nextHour}`;
            tr.appendChild(tdHora);
            
            // Columnas para cada día de la semana
            dias.forEach(dia => {
                const td = document.createElement('td');
                td.id = `cell-${dia}-${h}`;
                tr.appendChild(td);
            });
            
            body.appendChild(tr);
        }
    }

    // Renderizar la agenda unificada del docente seleccionado
    function displayTeacherSchedule(nombreDocente) {
        // Limpiar celdas previas de la tabla
        document.querySelectorAll('#scheduleBody td:not(.time-col)').forEach(td => {
            td.className = '';
            td.innerText = '';
        });

        const info = docentesDB[nombreDocente];
        const titleDiv = document.getElementById('selectedTeacherName');
        const noteDiv = document.getElementById('sharedNote');

        if (!info) {
            titleDiv.innerText = "Docente no encontrado";
            noteDiv.style.display = 'none';
            return;
        }

        titleDiv.innerText = `Horario Ocupado: ${nombreDocente}`;

        // Alerta roja si comparte curso con otro docente
        if (info.compartido && info.companeros.length > 0) {
            noteDiv.innerText = `⚠️ Este docente comparte curso con: ${info.companeros.join(', ')}`;
            noteDiv.style.display = 'block';
        } else {
            noteDiv.style.display = 'none';
        }

        // Pintar todos los bloques consolidados en color azul
        info.horarios.forEach(bloque => {
            for (let h = bloque.start; h < bloque.end; h++) {
                const cell = document.getElementById(`cell-${bloque.dia}-${h}`);
                if (cell) {
                    cell.className = 'occupied';
                    cell.innerText = 'DICTANDO CLASE';
                }
            }
        });
    }

    // Configurar lógica del buscador reactivo y autocompletado
    const searchInput = document.getElementById('searchTeacher');
    const suggestionsDiv = document.getElementById('suggestions');

    searchInput.addEventListener('input', function() {
        const query = this.value.toUpperCase().trim();
        suggestionsDiv.innerHTML = '';
        
        if (!query) {
            suggestionsDiv.style.display = 'none';
            return;
        }

        // Filtrar nombres sin coincidencias duplicadas
        const matches = Object.keys(docentesDB).filter(nombre => nombre.includes(query));

        if (matches.length > 0) {
            matches.slice(0, 6).forEach(match => {
                const div = document.createElement('div');
                div.innerText = match;
                div.addEventListener('click', () => {
                    searchInput.value = match;
                    suggestionsDiv.style.display = 'none';
                    displayTeacherSchedule(match);
                });
                suggestionsDiv.appendChild(div);
            });
            suggestionsDiv.style.display = 'block';
        } else {
            suggestionsDiv.style.display = 'none';
        }
    });

    // Ocultar sugerencias al hacer clic fuera del input
    document.addEventListener('click', function(e) {
        if (e.target !== searchInput) {
            suggestionsDiv.style.display = 'none';
        }
    });

    // Inicialización del calendario
    initScheduleTable();
</script>
</body>
</html>
